<!-- ========================= -->
<!-- UI DEL PRIMER CÓDIGO -->
<!-- + -->
<!-- JUEGO DEL SEGUNDO CÓDIGO -->
<!-- ========================= -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYSTEC CORE</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000814;
    font-family:'Courier New', monospace;
}

/* ========================= */
/* PANTALLA CYBERPUNK */
/* ========================= */

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:999;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at center,
    #001d3d 0%,
    #000814 100%);
}

/* CAJA CENTRAL */
.terminal-box{

    width:420px;

    background:rgba(0,10,30,0.95);

    border:2px solid #00ffee;

    border-radius:22px;

    padding:45px;

    text-align:center;

    box-shadow:
    0 0 10px #00ffee,
    0 0 30px #00ffee,
    0 0 60px rgba(0,255,238,.7);

}

/* TITULO */
.title-core{
    color:#00ffee;
    letter-spacing:12px;
    font-size:42px;
    margin-bottom:40px;
    font-weight:bold;
}

/* INPUT */
.cyber-input{

    width:100%;
    height:58px;

    background:#000;

    border:1px solid #00ffee;

    color:#8b8b8b;

    text-align:center;

    font-size:30px;

    font-family:inherit;

    outline:none;

    box-sizing:border-box;

}

/* BOTON */
.btn-systec{

    margin-top:35px;

    width:85%;
    height:70px;

    border:none;

    cursor:pointer;

    background:#00f5d4;

    color:#000;

    font-size:20px;

    font-weight:bold;

    clip-path:polygon(10% 0%,100% 0%,90% 100%,0% 100%);

    transition:.3s;

}

.btn-systec:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #00ffee;
}

/* BOTON VOLVER */
.btn-volver{

    margin-top:20px;

    width:100%;

    height:48px;

    border:1px solid #00ffee;

    background:rgba(0,255,238,.08);

    color:#00ffee;

    font-family:inherit;

    cursor:pointer;

}

/* HUD */
#ui-top{

    position:absolute;
    top:20px;
    left:20px;

    z-index:20;

    display:none;

    padding:18px;

    background:rgba(0,10,20,.9);

    border:2px solid #00ffee;

    border-radius:12px;

    color:#00ffee;

    box-shadow:0 0 15px #00ffee;

    font-size:24px;
}

</style>

<script>

let juegoIniciado = false;
let keys = {};

window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup", e=>keys[e.code]=false);

/* ========================= */
/* INICIAR */
/* ========================= */

function iniciar(){

    const nombre = document.querySelector("#input-nombre").value;

    if(nombre.trim()===""){
        alert("INGRESA TU ID");
        return;
    }

    document.querySelector("#user-display").innerText =
    nombre.toUpperCase();

    document.querySelector("#start").style.display="none";

    document.querySelector("#ui-top").style.display="block";

    juegoIniciado = true;
}

/* ========================= */
/* GAMEPLAY */
/* ========================= */

AFRAME.registerComponent('motor-gameplay', {

init:function(){

    this.el.addEventListener('collide', (e)=>{

        let t = e.detail.body.el;

        if(t.id==="lava"){
            location.reload();
        }

        if(t.classList.contains("boost")){
            this.el.body.velocity.y = 18;
        }

        if(t.id==="meta"){
            alert("¡GANASTE!");
            location.reload();
        }

    });

},

tick:function(){

    if(!juegoIniciado || !this.el.body) return;

    let v = this.el.body.velocity;

    if(keys["KeyW"]) v.z = -8;
    else if(keys["KeyS"]) v.z = 8;
    else v.z = 0;

    if(keys["KeyA"]) v.x = -8;
    else if(keys["KeyD"]) v.x = 8;
    else v.x = 0;

    if(keys["Space"] && Math.abs(v.y)<0.1){
        v.y = 12;
    }

}

});

</script>

</head>

<body>

<!-- ========================= -->
<!-- PANTALLA INICIO -->
<!-- ========================= -->

<div id="start" class="overlay">

    <div class="terminal-box">

        <div class="title-core">
            SYSTEC CORE
        </div>

        <input
        type="text"
        id="input-nombre"
        class="cyber-input"
        placeholder="ID DEL PILOTO"
        maxlength="12">

        <br>

        <button class="btn-systec" onclick="iniciar()">
            ESTABLECER ENLACE
        </button>

        <br>

        <button class="btn-volver">
            ← VOLVER AL PORTAL SYSTEC
        </button>

    </div>

</div>

<!-- ========================= -->
<!-- HUD -->
<!-- ========================= -->

<div id="ui-top">

    ID: <span id="user-display">---</span><br>
    PTS: 0<br>
    ❤️❤️❤️

</div>

<!-- ========================= -->
<!-- ESCENA -->
<!-- ========================= -->

<a-scene physics="gravity:-18">

<!-- LAVA -->
<a-plane
id="lava"
static-body
position="0 -6 0"
rotation="-90 0 0"
width="2000"
height="2000"

material="
color:#330000;
emissive:#ff2200;
emissiveIntensity:1"

animation="
property: material.offset;
to:2 2;
dur:15000;
loop:true">
</a-plane>

<!-- PLATAFORMAS -->

<a-box static-body position="0 0 0"
width="8"
height="0.5"
depth="8"
color="#222">
</a-box>

<a-box static-body
position="0 4 -12"
width="5"
height="0.4"
depth="5"
color="#00ffff">
</a-box>

<a-box static-body
position="-9 7 -18"
width="5"
height="0.4"
depth="5"
color="#ff00ff"

animation="
property: position;
to:-9 10 -18;
dur:1800;
dir:alternate;
loop:true">
</a-box>

<a-box
  static-body
  position="0 9 -26"
  width="5"
  height="0.4"
  depth="5"
  color="#00ffff"

  animation="
    property: position;
    to: 5 9 -26;
    dur: 2000;
    dir: alternate;
    loop: true">
</a-box>

<a-box static-body
position="0 10 -28"
width="6"
height="0.3"
depth="6"
color="#ff4444"

animation="
property: visible;
to:false;
dur:1000;
dir:alternate;
loop:true">
</a-box>

<a-box static-body
position="0 14 -40"
width="4"
height="0.3"
depth="4"

material="
color:#00ffcc;
emissive:#00ffcc"

animation="
property: material.emissiveIntensity;
from:0.2;
to:2;
dur:1000;
loop:true;
dir:alternate">
</a-box>

<a-box static-body
position="12 14 -45"
width="5"
height="0.4"
depth="5"
color="#ffaa00"

animation="
property: rotation;
to:0 360 0;
dur:3000;
loop:true">
</a-box>

<!-- BOOST -->

<a-box class="boost"
static-body
position="0 18 -55"

width="4"
height="0.3"
depth="4"

material="
color:#00ff00;
emissive:#00ff00">
</a-box>

<!-- META -->

<a-entity id="meta"
static-body
position="0 25 -80">

<a-box
width="10"
height="1"
depth="10"

color="#00ffff"

material="
emissive:#00ffff;
emissiveIntensity:2">
</a-box>

</a-entity>

<!-- JUGADOR -->
<!-- (SIN EDITAR) -->

<a-entity
id="jugador"
position="0 3 0"
scale="1.5 1.5 1.5"
motor-gameplay
dynamic-body="mass: 2; fixedRotation: true">

  <a-box position="0 1 -0.0178"
  depth="0.3"
  height="0.8"
  width="0.5"
  color="#0D47A1"></a-box>

  <a-sphere position="0 1.6 0"
  radius="0.25"
  color="#543d27"></a-sphere>

  <a-sphere position="-0.08 1.65 -0.24727"
  radius="0.02"
  color="#000"></a-sphere>

  <a-sphere position="0.08 1.65 -0.26903"
  radius="0.02"
  color="#000"></a-sphere>

  <a-text value="X"
  position="0.08 1.58 0.23"
  scale="0.2 0.2 0.2"
  color="#000"></a-text>

  <a-box position="0.00797 1.78624 0.01477"
  depth="0.35"
  height="0.12"
  width="0.5"
  color="#20b669"
  scale="0.99 1.16 1.37"></a-box>

  <a-box position="-0.4 1 0"
  depth="0.2"
  height="0.7"
  width="0.2"
  color="#543d27"></a-box>

  <a-box position="0.4 1 0"
  depth="0.2"
  height="0.7"
  width="0.2"
  color="#543d27"></a-box>

  <a-torus position="0.02027 1.22817 -0.17149"
  radius="0.18"
  radius-tubular="0.01"
  color="#ffe042"
  rotation="3.76 0 0"></a-torus>

  <a-box position="-0.15 0.3 0"
  depth="0.25"
  height="0.7"
  width="0.2"
  color="#222"></a-box>

  <a-box position="0.15 0.3 0"
  depth="0.25"
  height="0.7"
  width="0.2"
  color="#222"></a-box>

</a-entity>

<!-- CAMARA -->

<a-entity>
    <a-camera position="0 15 15"></a-camera>
</a-entity>

<a-light type="ambient" intensity="0.5"></a-light>

</a-scene>

</body>
</html>
