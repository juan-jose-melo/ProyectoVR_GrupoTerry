<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARBERI SAGA - 3 LEVELS</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

<style>
    body{ margin:0; font-family:'Courier New', monospace; background:#000; overflow:hidden; touch-action:none; }
    .overlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle,#0a1a2e 0%,#000 100%); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#00ffcc; text-align:center; border:8px double #00ffcc; box-sizing:border-box; }
    .terminal-box{ background:rgba(0,20,40,0.95); padding:50px; border:2px solid #00ffcc; box-shadow:0 0 40px #00ffcc; border-radius:20px; }
    input{ background:#000; border:1px solid #00ffcc; color:#00ffcc; padding:15px; font-size:22px; text-align:center; width:320px; margin-top:25px; outline:none; text-transform:uppercase; }
    .btn-systec{ margin-top:35px; padding:15px 45px; background:#00ffcc; color:#000; border:none; font-weight:bold; cursor:pointer; font-size:20px; }
    #ui-top{ position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,10,20,0.85); color:#00ffcc; padding:18px; border:2px solid #00ffcc; border-radius:10px; display:none; }
    .controles-movil{ position:absolute; bottom:20px; width:100%; display:none; justify-content:space-between; padding:0 30px; box-sizing:border-box; z-index:1000; pointer-events:none; }
    .d-pad{ display:grid; grid-template-columns:repeat(3,55px); gap:5px; pointer-events:auto; }
    .d-btn,.btn-salto{ width:55px; height:55px; background:rgba(0,255,204,0.2); border:2px solid #00ffcc; color:#00ffcc; display:flex; align-items:center; justify-content:center; border-radius:10px; font-weight:bold; user-select:none; }
    .btn-salto{ width:100px; height:80px; font-size:14px; pointer-events:auto; }
</style>

<script>
let nivelActual = parseInt(sessionStorage.getItem('arberi_lvl')) || 1;
let juegoIniciado = false;

function iniciarMision(){
    document.querySelector('#pantalla-registro').style.display = "none";
    document.querySelector('#ui-top').style.display = "block";
    if('ontouchstart' in window || navigator.maxTouchPoints > 0){
        document.querySelector('.controles-movil').style.display = "flex";
    }
    juegoIniciado = true;
}

function avanzarNivel() {
    juegoIniciado = false;
    // Lógica para 3 niveles: 1 -> 2 -> 3 -> (vuelve a 1)
    let proximo = nivelActual + 1;
    if(proximo > 3) proximo = 1; 
    
    sessionStorage.setItem('arberi_lvl', proximo);
    setTimeout(() => { location.reload(); }, 100);
}

function morirTotal() {
    sessionStorage.setItem('arberi_lvl', 1);
    location.reload();
}

AFRAME.registerComponent('motor-gameplay',{
    init:function(){
        this.keys = {};
        this.vidas = 3;
        this.puedeSaltar = true;
        this.invulnerable = false;
        
        window.addEventListener('keydown',(e)=>{ this.keys[e.code] = true; });
        window.addEventListener('keyup',(e)=>{ this.keys[e.code] = false; });
        
        const bindTouch = (id,code)=>{
            const el = document.querySelector(id);
            if(el) {
                el.addEventListener('touchstart',(e)=>{ e.preventDefault(); this.keys[code] = true; });
                el.addEventListener('touchend',(e)=>{ e.preventDefault(); this.keys[code] = false; });
            }
        };
        bindTouch('#m-up','KeyW'); bindTouch('#m-down','KeyS');
        bindTouch('#m-left','KeyA'); bindTouch('#m-right','KeyD');
        bindTouch('#m-jump','Space');

        this.el.addEventListener('collide',(e)=>{
            const target = e.detail.body.el;
            if(!target || !juegoIniciado) return;

            if(target.id === 'lava' && !this.invulnerable) this.perderVida();
            
            // ESTE ES EL BLOQUE QUE DETECTA EL FINAL DEL NIVEL
            if(target.id === 'meta'){
                avanzarNivel();
            }
        });
    },
    perderVida:function(){
        this.vidas--;
        document.querySelector('#vidas-val').innerText = "❤️".repeat(this.vidas);
        if(this.vidas <= 0){
            juegoIniciado = false;
            document.querySelector('#game-over-screen').style.display = "flex";
        } else {
            this.el.body.position.set(0,3,0);
            this.el.body.velocity.set(0,0,0);
            this.invulnerable = true;
            setTimeout(()=>{ this.invulnerable = false; }, 1000);
        }
    },
    tick:function(){
        if(!this.el.body || !juegoIniciado) return;
        this.el.body.quaternion.set(0,0,0,1);
        this.el.body.angularVelocity.set(0,0,0);
        let v = this.el.body.velocity;
        let speed = 8;
        if(this.keys['KeyW']) v.z = -speed; else if(this.keys['KeyS']) v.z = speed; else v.z = 0;
        if(this.keys['KeyA']) v.x = -speed; else if(this.keys['KeyD']) v.x = speed; else v.x = 0;
        if(this.keys['Space'] && Math.abs(v.y) < 0.1 && this.puedeSaltar){
            v.y = 13; this.puedeSaltar = false;
        }
        if(!this.keys['Space']) this.puedeSaltar = true;
    }
});

AFRAME.registerComponent('seguimiento-camara',{
    init: function() { this.jugador = document.querySelector('#jugador'); },
    tick:function(){
        if(!this.jugador || !juegoIniciado) return;
        this.el.object3D.position.lerp(this.jugador.object3D.position, 0.1);
    }
});

AFRAME.registerComponent('trampa-caida',{
    init:function(){
        this.el.addEventListener('collide',(e)=>{
            if(e.detail.body.el?.id === "jugador"){
                setTimeout(()=>{
                    this.el.removeAttribute('static-body');
                    this.el.setAttribute('dynamic-body',{ mass:5 });
                },200);
            }
        });
    }
});
</script>
</head>

<body>

        <div id="m-left" class="d-btn">◀</div><div id="m-down" class="d-btn">▼</div><div id="m-right" class="d-btn">▶</div>

        <button class="btn-systec" onclick="iniciarMision()">ESTABLECER ENLACE</button>
    </div>
</div>

    </div>
